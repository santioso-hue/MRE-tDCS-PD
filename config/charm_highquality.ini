# High quality charm settings for sub04 — T1-only, macOS Apple Silicon
# Changes from default are marked with CHANGED
#
#  left-hand side should be in JSON synthax
#  int = 1
#  float = 1.2
#  bool = true/false (lower case)
#  str = "string" (double quotes)
#  list = [1, 2, 3]
#  dict = {"a": 1, "b": 2} (key must be string)

[general]
# CHANGED: 1 thread — prevents macOS OpenMP deadlock (default: 8)
threads = 1


[preprocess]
# CHANGED: denoise before segmentation — improves tissue boundary detection (default: false)
denoise = true


[samseg]
atlas_name = "charm_atlas_mni_v1-1"
gmm_parameter_file = ""
init_type = "trega"


[initmni]
translation_scale = -100
max_iter = 300
shrink_factors = [2, 1, 0]
bg_value = 0
smoothing_factors = [4.0, 2.0, 0.0]
center_of_mass = true
samp_factor = 1.0
num_histogram_bins = 64


[initatlas]
affine_scales = [[0.85, 0.85, 0.85], [0.9, 0.9, 0.85], [0.95, 0.95, 0.85]]
affine_rotations = [-7, -3.5, 0, 3.5, 7]
affine_horizontal_shifts = [-20.0, -10.0, 0, 10.0, 20.0]
affine_vertical_shifts = [-10.0, 0.0, 10.0]
neck_search_bounds = [-0.3, 0.1]
downsampling_factor_affine = 2


[segment]
downsampling_targets = [2.0, 1.0]
# CHANGED: 50mm — more localised bias field correction vs default 70mm
# Helps in skull base / brain stem region where intensity gradients are steep
bias_kernel_width = 50
background_mask_sigma = 4.0
background_mask_threshold = 0.001
# CHANGED: 0.07 — slightly more flexible atlas deformation for better boundary fit (default: 0.1)
mesh_stiffness = 0.07
diagonal_covariances = false
csf_factor = 0.3


[surfaces]
topofit_contrast = "T1w"
topofit_resolution = "1mm"
topofit_device = "cpu"
central_surface_fraction = 0.5
central_surface_method = "equivolume"
update_segmentation_from_surfaces = true
update_segmentation_protect = {
    "gm_to_csf": [
        "Left-Cerebellum-White-Matter",
        "Left-Cerebellum-Cortex",
        "Left-Hippocampus",
        "Left-Amygdala",
        "Right-Cerebellum-White-Matter",
        "Right-Cerebellum-Cortex",
        "Right-Hippocampus",
        "Right-Amygdala",
        "Optic-Chiasm",
        "Optic-Nerve"
    ],
    "wm_to_gm": [
        "Left-Cerebellum-White-Matter",
        "Left-VentralDC",
        "Right-Cerebellum-White-Matter",
        "Right-VentralDC",
        "Brain-Stem",
        "Optic-Chiasm",
        "Spinal-Cord",
        "Optic-Nerve"
    ],
    "gm_to_wm": [
        "Left-Thalamus-Proper",
        "Left-Caudate",
        "Left-Putamen",
        "Left-Pallidum",
        "Left-Hippocampus",
        "Left-Amygdala",
        "Left-Accumbens-area",
        "Right-Thalamus-Proper",
        "Right-Caudate",
        "Right-Putamen",
        "Right-Pallidum",
        "Right-Hippocampus",
        "Right-Amygdala",
        "Right-Accumbens-area"
    ],
    "csf_to_gm": [
        "Left-Lateral-Ventricle",
        "Left-Inf-Lat-Vent",
        "Left-choroid-plexus",
        "Right-Lateral-Ventricle",
        "Right-Inf-Lat-Vent",
        "Right-choroid-plexus"
    ]}
# CHANGED: 1 — sequential hemisphere processing to avoid macOS parallelism issues (default: 2)
spherical_registration_process_pool = 1


[mesh]
# CHANGED: finer elements across all tissues, especially GM (label 2)
# GM [0.5, 1.5] vs default [1, 2] — finer cortical mesh = more accurate E-field
# Standard [0.8, 4] vs default [1, 5] — finer everywhere
# WM [0.8, 5] vs default [1, 7] — finer white matter
# Scalp [0.8, 8] vs default [1, 10] — finer scalp surface
elem_sizes = {"standard": {"range": [0.8, 4], "slope": 1.0},
                     "1": {"range": [0.8, 5], "slope": 1.0},
                     "2": {"range": [0.5, 1.5], "slope": 0.8},
                     "5": {"range": [0.8, 8], "slope": 0.6}}
# CHANGED: 3 — slightly more smoothing of element size field (default: 2)
smooth_size_field = 3
# CHANGED: 1.5mm — finer outer scalp triangles (default: 2.0)
skin_facet_size = 1.5
# CHANGED: tighter facet distances — mesh follows segmentation boundaries more closely
# [0.05, 2] vs default [0.1, 3]
facet_distances = {"standard": {"range": [0.05, 2], "slope": 0.4}}
# CHANGED: true — enables sliver perturbation, exudation and Lloyd optimisation (default: false)
# Produces higher quality tetrahedra
optimize = true
apply_cream = true
remove_spikes = true
skin_tag = 1005
hierarchy = false
# CHANGED: 20 — more surface smoothing passes (default: 10)
smooth_steps = 20
# CHANGED: 40 — more scalp smoothing passes (default: 20)
skin_care = 40
mmg_noinsert = false
